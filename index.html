<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="left">
            <img class="logo"
            src="./img/Ny6hrBVLYjl.webp" alt="logo">
            

            <h1>
                See everyday moments from your,<span class="gradient">close friends.</span>
            </h1>

            <div class="card-one"></div>
            <img src="./img/-erGonz07kB.webp" alt="card-one">

        </div>

    </div>
    <div class="right">
        <div class="form">
            <h2>Log into Instagram </h2>

            <input type="text" class="input" placeholder="Mobile number, username or email">

            
            <input type="password" class="input" placeholder="password">


            <button class="btn login">Log in</button>

            <div class="forgot">Forgot password</div>

            <button class="outline"><span class="fb-icon">f</span>Login in with Facebook</button>

            <button class="outline-create">Create new account</button>



        </div>

    </div>
    
</body>
</html>
